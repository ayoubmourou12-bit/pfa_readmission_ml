data:
  raw_path: data/raw/diabetic_data.csv
  processed_dir: data/processed
  test_size: 0.2
  random_state: 42
  dedup_col: patient_nbr
  drop_cols:
    - weight
    - payer_code
    - medical_specialty
    - citoglipton
    - examide
    - encounter_id
    - patient_nbr
  drop_discharge_id: 11

preprocessing:
  skewed_cols: []
  winsorize_cols:
    - number_outpatient
    - number_inpatient
    - number_emergency
    - num_medications
  winsorize_quantile: 0.99
  med_cols:
    - metformin
    - repaglinide
    - nateglinide
    - chlorpropamide
    - glimepiride
    - glipizide
    - glyburide
    - pioglitazone
    - rosiglitazone
    - acarbose
    - miglitol
    - insulin
    - glyburide-metformin
    - tolazamide
    - metformin-pioglitazone
    - metformin-rosiglitazone
    - glimepiride-pioglitazone
    - glipizide-metformin
    - troglitazone
    - tolbutamide
    - acetohexamide

training:
  model: lightgbm
  n_estimators: 500
  max_depth: 5
  num_leaves: 31
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_samples: 20
  reg_alpha: 0.1
  reg_lambda: 1.0
  class_weight: balanced
  random_state: 42
  n_iter_search: 40

evaluation:
  threshold_recall_min: 0.60
  metrics_path: reports/metrics.json
  confusion_matrix_path: reports/confusion_matrix.png
  main_metric: average_precision